# Tag-driven release to Maven Central via the Sonatype Central Portal.
#
# Required repository secrets:
#   SONATYPE_USERNAME       — Central Portal user token name
#   SONATYPE_PASSWORD       — Central Portal user token value
#   SIGNING_KEY             — ASCII-armored GPG private key (gpg --armor --export-secret-keys KEYID)
#   SIGNING_KEY_PASSWORD    — passphrase for SIGNING_KEY
#
# The Gradle build is expected to read these via environment variables and
# configure the maven-publish + signing plugins accordingly.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Verify build
        run: ./gradlew assemble test --stacktrace

      - name: Publish to Maven Central
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache --stacktrace

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
