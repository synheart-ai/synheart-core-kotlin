plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.plugin.serialization'
    id 'maven-publish'
}

group = 'ai.synheart'
version = '1.2.0'
description = 'Synheart Core SDK for Android - Unified HSI-compatible data collection, on-device state computation, and module orchestration.'

android {
    namespace 'ai.synheart.core'
    compileSdk 34

    defaultConfig {
        minSdk 24

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        consumerProguardFiles "consumer-rules.pro"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    publishing {
        singleVariant("release") {
            withSourcesJar()
        }
    }
}

dependencies {
    // AndroidX Core
    implementation 'androidx.core:core-ktx:1.12.0'
    
    // Kotlin Coroutines
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.7.3'
    
    // AndroidX Lifecycle
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'
    implementation 'androidx.lifecycle:lifecycle-service:2.6.2'
    
    // Kotlinx Serialization
    implementation 'org.jetbrains.kotlinx:kotlinx-serialization-json:1.6.0'

    // OkHttp for HTTP client (Cloud Connector)
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'

    // WorkManager
    implementation 'androidx.work:work-runtime-ktx:2.9.0'
    
    // AndroidX Security (for encrypted storage)
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'

    // JNA for synheart-core-runtime native library
    implementation 'net.java.dev.jna:jna:5.14.0@aar'

    // Synheart sibling SDKs
    // emotion and focus removed — now computed by synheart-engine
    // and accessed via CoreRuntimeBridge.
    implementation 'ai.synheart:synheart-wear:0.3.0'
    implementation 'ai.synheart:synheart-behavior:0.4.1'
    implementation 'ai.synheart:session:0.1.0'
    implementation 'ai.synheart:synheart-auth:0.1.0'
    
    // JNA (non-Android JAR for host unit tests)
    testImplementation 'net.java.dev.jna:jna:5.14.0'
    // Real org.json for host unit tests (Android stubs throw at runtime)
    testImplementation 'org.json:json:20231013'

    // Testing
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.jetbrains.kotlinx:kotlinx-coroutines-test:1.7.3'
    testImplementation 'io.mockk:mockk:1.13.8'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}

// Forward jna.library.path to the test JVM so host-side tests can load the native library.
// The library is expected in the project's native/ directory (copied by `make kotlin`).
// Override with -Djna.library.path=/custom/path if needed.
tasks.withType(Test) {
    def jnaPath = System.getProperty("jna.library.path")
            ?: "${rootProject.projectDir}/native"
    systemProperty 'jna.library.path', jnaPath
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId = 'ai.synheart'
                artifactId = 'synheart-core'
                version = project.version

                pom {
                    name = 'Synheart Core SDK'
                    description = project.description
                    url = 'https://github.com/synheart-ai/synheart-core-kotlin'
                    licenses {
                        license {
                            name = 'Apache License 2.0'
                            url = 'https://www.apache.org/licenses/LICENSE-2.0'
                        }
                    }
                }
            }
        }
    }
}

